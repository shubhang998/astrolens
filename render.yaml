services:
  - type: web
    name: astrolens
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /v1/health
    # Bind Render's assigned port and expose the service's own public URL so
    # rendered-image links and the widget CSP use the stable deploy domain.
    dockerCommand: >-
      sh -c 'ASTROLENS_PUBLIC_BASE_URL=$RENDER_EXTERNAL_URL
      uvicorn astrolens.api.main:app --host 0.0.0.0 --port $PORT'
    envVars:
      - key: ASTROLENS_ENV
        value: development
    autoDeploy: true
