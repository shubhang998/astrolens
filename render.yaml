services:
  - type: web
    name: astrolens
    runtime: docker
    plan: pro
    region: oregon
    healthCheckPath: /v1/health
    # The image entrypoint (docker/entrypoint.sh) binds Render's assigned
    # $PORT and adopts $RENDER_EXTERNAL_URL as the public base URL.
    # The persistent disk keeps rendered images across deploys/restarts so the
    # service never returns to a stone-cold cache.
    disk:
      name: astrolens-cache
      mountPath: /var/astrolens-cache
      sizeGB: 5
    envVars:
      - key: ASTROLENS_ENV
        value: development
      - key: ASTROLENS_RENDER_CACHE_DIR
        value: /var/astrolens-cache/renders
      # Pro instance (4GB): the startup warmer keeps the 50 curated objects
      # answering from warm caches.
      - key: ASTROLENS_WARM_CACHE
        value: "1"
      # Pro instance (4GB/2CPU): three concurrent renders, process-wide
      # (warmer + user calls share this budget).
      - key: ASTROLENS_MAX_CONCURRENT_RENDERS
        value: "3"
      # Set in the Render dashboard (never in the repo): enables the Sonnet 5
      # interpretation layer and vision ranking. Everything degrades to
      # deterministic behavior when absent.
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: true
