services:
  api:
    build:
      context: .
    command: uvicorn astrolens.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ASTROLENS_ENV: local
      DATABASE_URL: postgresql+psycopg://astrolens:astrolens@postgres:5432/astrolens
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: astrolens
      POSTGRES_USER: astrolens
      POSTGRES_PASSWORD: astrolens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
